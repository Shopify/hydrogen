<header class="border-border bg-surface sticky top-0 z-40 border-b">
  <div
    class="max-w-page px-margin mx-auto flex h-16 w-full items-center justify-between"
    data-header-nav-group
  >
    <div class="flex items-center gap-2">
      <div class="-ms-2 hidden max-md:block" data-hamburger-wrapper>
        <button
          type="button"
          commandfor="mobile-nav-drawer"
          command="show-modal"
          class="button-icon focus-visible:outline-accent inline-flex h-11 w-11 cursor-pointer items-center justify-center gap-2 rounded font-medium focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,background-color,border-color,transform] motion-safe:active:scale-[0.97]"
          aria-label="Menu"
        >
          <img
            src="../icons/icon-menu.svg"
            width="20"
            height="20"
            alt=""
            class="size-5"
            aria-hidden="true"
          />
        </button>
      </div>

      <a
        href="#"
        class="text-on-surface focus-visible:outline-accent inline-flex items-center rounded-sm text-lg font-medium no-underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2"
      >
        CORE
      </a>
    </div>

    <nav
      aria-label="Main navigation"
      class="mx-8 hidden min-w-0 flex-1 items-center gap-8 md:flex"
      data-desktop-nav
    >
      <a
        href="/collections"
        class="text-on-surface focus-visible:outline-accent shrink-0 rounded-sm text-sm font-normal whitespace-nowrap no-underline hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-opacity"
      >
        Collections
      </a>
      <a
        href="/collections/men"
        class="text-on-surface focus-visible:outline-accent shrink-0 rounded-sm text-sm font-normal whitespace-nowrap no-underline hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-opacity"
        >Men</a
      >
      <a
        href="/collections/women"
        class="text-on-surface focus-visible:outline-accent shrink-0 rounded-sm text-sm font-normal whitespace-nowrap no-underline hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-opacity"
        >Women</a
      >
      <a
        href="/collections/accessories"
        class="text-on-surface focus-visible:outline-accent shrink-0 rounded-sm text-sm font-normal whitespace-nowrap no-underline hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-opacity"
        >Accessories</a
      >
    </nav>

    <div class="flex items-center gap-0">
      <a
        href="/search"
        class="button-icon focus-visible:outline-accent inline-flex h-11 w-11 items-center justify-center gap-2 rounded font-medium no-underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,background-color,border-color,transform] motion-safe:active:scale-[0.97]"
        aria-label="Search"
        data-testid="search-modal-trigger"
      >
        <img
          src="../icons/icon-search.svg"
          width="20"
          height="20"
          alt=""
          class="size-5"
          aria-hidden="true"
        />
      </a>
      <noscript>
        <form action="/search" method="get" role="search" class="sr-only">
          <label for="header-search-q">Search</label>
          <input id="header-search-q" name="q" type="search" />
          <button type="submit">Search</button>
        </form>
      </noscript>
      <a
        href="#"
        class="text-on-surface focus-visible:outline-accent inline-flex h-11 w-11 items-center justify-center rounded hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-opacity"
        aria-label="Account"
      >
        <img
          src="../icons/icon-user.svg"
          width="20"
          height="20"
          alt=""
          class="size-5"
          aria-hidden="true"
        />
      </a>
      <button
        type="button"
        commandfor="cart-drawer"
        command="show-modal"
        class="text-on-surface focus-visible:outline-accent relative inline-flex h-11 w-11 cursor-pointer items-center justify-center rounded bg-transparent p-0 hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition motion-safe:active:scale-[0.97]"
        aria-label="Cart (2 items)"
      >
        <span
          class="relative inline-flex size-5 shrink-0 items-center justify-center"
          aria-hidden="true"
        >
          <img src="../icons/icon-cart.svg" width="20" height="20" alt="" class="size-5" />
          <span
            class="bg-interactive text-interactive-text absolute end-0 top-0 flex h-5 w-5 translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full text-xs font-medium"
          >
            2
          </span>
        </span>
      </button>
      <span aria-live="polite" aria-atomic="true" class="sr-only">2 items in cart</span>
    </div>
  </div>

  <s-dialog close-on-navigate>
    <dialog
      id="mobile-nav-drawer"
      class="drawer-left bg-surface text-on-surface"
      aria-labelledby="mobile-nav-title"
    >
      <div class="flex h-full flex-col">
        <div class="relative flex min-h-[52px] shrink-0 items-center px-4 py-1">
          <button
            type="button"
            id="mobile-nav-back"
            commandfor="mobile-nav"
            command="--pop"
            class="text-on-surface focus-visible:outline-accent hidden items-center gap-1 rounded-sm py-2 ps-1 pe-2 text-sm hover:opacity-70 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition motion-safe:active:scale-[0.97]"
            aria-label="Back"
          >
            <img
              src="../icons/icon-chevron-left.svg"
              width="16"
              height="16"
              alt=""
              class="size-4"
              aria-hidden="true"
            />
          </button>
          <span
            class="text-on-surface pointer-events-none absolute left-1/2 -translate-x-1/2 text-sm font-medium"
            id="mobile-nav-title"
            aria-live="polite"
            >Mobile navigation</span
          >
          <button
            type="button"
            commandfor="mobile-nav-drawer"
            command="close"
            class="button-icon focus-visible:outline-accent ms-auto inline-flex h-11 w-11 cursor-pointer items-center justify-center rounded font-medium focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,background-color,border-color,transform] motion-safe:active:scale-[0.97]"
            aria-label="Close"
          >
            <img
              src="../icons/icon-x.svg"
              width="20"
              height="20"
              alt=""
              class="size-5"
              aria-hidden="true"
            />
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
          <s-mobile-nav id="mobile-nav" class="relative block h-full overflow-hidden">
            <div id="mobile-nav-panel-root" class="absolute inset-0 translate-x-0 overflow-y-auto">
              <nav aria-label="Mobile navigation">
                <ul role="list" class="flex flex-col">
                  <li>
                    <a
                      href="/collections"
                      class="text-on-surface flex items-center rounded-sm py-3 text-xl font-normal no-underline hover:opacity-70 motion-safe:transition-opacity"
                      >Collections</a
                    >
                  </li>
                  <li>
                    <a
                      href="/collections/men"
                      class="text-on-surface flex items-center rounded-sm py-3 text-xl font-normal no-underline hover:opacity-70 motion-safe:transition-opacity"
                      >Men</a
                    >
                  </li>
                  <li>
                    <a
                      href="/collections/women"
                      class="text-on-surface flex items-center rounded-sm py-3 text-xl font-normal no-underline hover:opacity-70 motion-safe:transition-opacity"
                      >Women</a
                    >
                  </li>
                  <li>
                    <a
                      href="/collections/accessories"
                      class="text-on-surface flex items-center rounded-sm py-3 text-xl font-normal no-underline hover:opacity-70 motion-safe:transition-opacity"
                      >Accessories</a
                    >
                  </li>
                </ul>
              </nav>
            </div>
          </s-mobile-nav>
        </div>
      </div>
    </dialog>
  </s-dialog>

  <s-dialog>
    <dialog
      id="cart-drawer"
      class="drawer-right bg-surface text-on-surface"
      aria-labelledby="cart-drawer-title"
    >
      <div class="flex h-full flex-col">
        <div class="flex shrink-0 items-center py-2 ps-4">
          <div class="flex flex-1 items-center gap-2">
            <h2 id="cart-drawer-title" class="text-on-surface text-lg font-medium">Cart</h2>
            <span class="cart-count-badge">2</span>
          </div>
          <button
            type="button"
            commandfor="cart-drawer"
            command="close"
            class="button-icon focus-visible:outline-accent inline-flex h-11 w-11 cursor-pointer items-center justify-center rounded font-medium focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,background-color,border-color,transform] motion-safe:active:scale-[0.97]"
            aria-label="Close"
          >
            <img
              src="../icons/icon-x.svg"
              width="20"
              height="20"
              alt=""
              class="size-5"
              aria-hidden="true"
            />
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
          <s-cart
            class="block"
            id="cart-drawer-items"
            data-partials="cart-drawer,cart-count"
            data-removed-message="Item removed from cart"
            data-updated-message="Cart updated"
            data-update-error="Could not update cart. Please try again."
          >
            <div class="divide-border -mt-4 divide-y">
              <div
                class="grid grid-cols-[var(--spacing-cart-line-thumbnail-width)_1fr_auto] items-stretch gap-3 py-4"
              >
                <div class="bg-surface-secondary h-full w-full overflow-hidden">
                  <img
                    src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=240&q=80"
                    alt="Canvas Overshirt in Cocoa"
                    class="h-full w-full object-cover"
                  />
                </div>
                <div class="min-w-0">
                  <p class="type-body-sm text-on-surface font-medium">Canvas Overshirt</p>
                  <p class="text-on-surface-secondary mt-1 text-xs">Cocoa / M</p>
                  <p class="text-on-surface mt-2 text-sm">$128.00</p>
                </div>
                <button
                  type="button"
                  commandfor="cart-drawer-items"
                  command="--remove"
                  class="button-icon focus-visible:outline-accent self-start rounded focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,opacity,transform] motion-safe:active:scale-[0.97]"
                  aria-label="Remove: Canvas Overshirt"
                >
                  <img
                    src="../icons/icon-trash.svg"
                    width="20"
                    height="20"
                    alt=""
                    class="size-5"
                    aria-hidden="true"
                  />
                </button>
              </div>
            </div>
            <span class="sr-only" aria-live="polite" aria-atomic="true" data-cart-status></span>
          </s-cart>
        </div>
        <div class="border-border shrink-0 border-t p-4">
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <span class="text-on-surface text-sm font-medium">Estimated total</span>
              <span class="text-on-surface text-base font-medium">$128.00</span>
            </div>
            <p class="text-on-surface-secondary text-xs">
              Taxes and shipping calculated at checkout
            </p>
            <a
              href="#"
              class="rounded-button button-primary focus-visible:outline-accent inline-flex h-11 w-full items-center justify-center gap-2 px-4 text-sm font-medium no-underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 motion-safe:transition-[color,background-color,border-color,transform] motion-safe:active:scale-[0.97]"
              >Checkout</a
            >
          </div>
        </div>
      </div>
    </dialog>
  </s-dialog>
</header>
