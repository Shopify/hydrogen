name: 🚀 CI
on: [pull_request]

jobs:
  # TODO: Remove after verifying token type for release PR fix
  debug-token-identity:
    name: 🔍 Debug - Check PAT identity
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check SHOPIFY_GH_ACCESS_TOKEN identity
        run: |
          echo "Checking SHOPIFY_GH_ACCESS_TOKEN identity..."
          RESPONSE=$(curl -s -H "Authorization: token $TOKEN" https://api.github.com/user)
          echo "Login: $(echo $RESPONSE | jq -r '.login')"
          echo "Type: $(echo $RESPONSE | jq -r '.type')"
          echo "Name: $(echo $RESPONSE | jq -r '.name')"
          # Check token prefix (first 4 chars only - safe to log)
          echo "Token prefix: ${TOKEN:0:4}..."
        env:
          TOKEN: ${{ secrets.SHOPIFY_GH_ACCESS_TOKEN }}

  check-node-version:
    name: 🔧 Node version sync
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate .nvmrc matches dev.yml
        run: |
          NVMRC_VERSION=$(tr -d 'v\n' < .nvmrc)
          DEV_YML_RAW=$(grep "node:" dev.yml | grep -oE "'v?[^']+'" | tr -d "'" | head -1)
          DEV_YML_VERSION=$(echo "$DEV_YML_RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          if [ -z "$NVMRC_VERSION" ]; then
            echo "::error::Could not parse version from .nvmrc"
            exit 1
          fi

          if [ -z "$DEV_YML_RAW" ]; then
            echo "::error::Could not find node: directive in dev.yml"
            exit 1
          fi

          if [ -z "$DEV_YML_VERSION" ]; then
            echo "::error::dev.yml must specify a FULL Node version (X.Y.Z format)"
            echo ""
            echo "Found: '$DEV_YML_RAW'"
            echo "Expected format: 'vX.Y.Z' (e.g., 'v20.19.5')"
            echo ""
            echo "The Shopify 'dev' tool requires a specific installable version,"
            echo "not just a major version like 'v20'. Nix needs the exact version"
            echo "to fetch from its package cache."
            exit 1
          fi

          NVMRC_MAJOR=$(echo "$NVMRC_VERSION" | cut -d. -f1)
          DEV_YML_MAJOR=$(echo "$DEV_YML_VERSION" | cut -d. -f1)

          if [ "$NVMRC_MAJOR" != "$DEV_YML_MAJOR" ]; then
            echo "::error::Node version mismatch between .nvmrc and dev.yml"
            echo ""
            echo "┌─────────────────────────────────────────────────────────────────┐"
            echo "│  IMPORTANT: This is NOT a configuration oversight!              │"
            echo "│                                                                 │"
            echo "│  The Shopify 'dev' tool CANNOT read from .nvmrc - it requires   │"
            echo "│  an explicit version. These files serve different tools:        │"
            echo "│    • .nvmrc  → used by nvm (flexible major version like 'v20')  │"
            echo "│    • dev.yml → used by dev tool (needs exact version 'v20.x.x') │"
            echo "│                                                                 │"
            echo "│  Both files MUST be updated TOGETHER when changing Node version.│"
            echo "└─────────────────────────────────────────────────────────────────┘"
            echo ""
            echo "Current state:"
            echo "  .nvmrc major version:  v$NVMRC_MAJOR"
            echo "  dev.yml major version: v$DEV_YML_MAJOR"
            echo ""
            echo "To fix: Update both files to use the same Node major version."
            exit 1
          fi

          echo "✅ Node versions in sync (major version: v$NVMRC_MAJOR)"

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      - name: 🔬 Lint
        run: npm run lint

  format:
    name: ⬣ Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-format-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      - name: 🔬 Check Formatting
        run: npm run format:check

  typecheck:
    name: Typescript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      # Enabling the turbo cache causes deployments to fail intermittently.
      # The build step fails with dependency issues. More investigation needed.
      # - name: 💾 Turbo cache
      #   id: turbo-cache
      #   uses: actions/cache@v3
      #   with:
      #     path: |
      #       node_modules/.cache/turbo
      #       **/.turbo
      #     key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
      #     restore-keys: |
      #       turbo-${{ github.job }}-${{ github.ref_name }}-

      - name: 📦 Build packages and templates
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run build:all

      - name: ✅ Typecheck
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run typecheck

      - name: 🧑‍💻 CLI manifest check
        run: 'test -z "$(git status --porcelain "packages/cli/oclif.manifest.json" )" || { echo -e "Run npm generate:manifest in packages/cli before pushing new commands or flags. Diff here:\n\n$(git diff)" ; exit 1; }'

  test_e2e:
    name: ⬣ E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      - name: 📦 Build packages and templates
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run build:all

      - name: 🎭 Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: 🔐 Install ejson
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go
          go install github.com/Shopify/ejson/cmd/ejson@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 🧪 Run E2E tests
        run: npx playwright test --workers=1
        env:
          EJSON_PRIVATE_KEY: ${{ secrets.EJSON_PRIVATE_KEY }}

      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  test_unit:
    name: ⬣ Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      - name: 📦 Build packages and templates
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run build:all

      - name: 🔬 Test
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run test

  validate_recipes:
    name: ⬣ Validate Recipes
    # TEMPORARILY DISABLED: Recipe system is being re-evaluated.
    # Remove this line to re-enable.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-validate-recipes-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⎔ Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📥 Install dependencies
        run: |
          npm ci
          npm rebuild

      - name: 📦 Build packages
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run build:pkg

      - name: 📝 Validate schema
        working-directory: cookbook
        run: npm run cookbook -- schema && git diff --exit-code recipe.schema.json

      - name: 🧐 Validate Recipes
        working-directory: cookbook
        run: SHOPIFY_HYDROGEN_FLAG_LOCKFILE_CHECK=false npm run cookbook -- validate
