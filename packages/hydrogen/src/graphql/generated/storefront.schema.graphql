"Implemented by resources that support custom metadata through [`Metafield`](https://shopify.dev/docs/api/storefront/current/objects/Metafield) objects. Types like [`Product`](https://shopify.dev/docs/api/storefront/current/objects/Product), [`Collection`](https://shopify.dev/docs/api/storefront/current/objects/Collection), and [`Customer`](https://shopify.dev/docs/api/storefront/current/objects/Customer) implement this interface to provide consistent access to metafields.\n\nYou can retrieve a [single metafield](https://shopify.dev/docs/api/storefront/current/interfaces/HasMetafields#fields-metafield) by namespace and key, or fetch [multiple metafields](https://shopify.dev/docs/api/storefront/current/interfaces/HasMetafields#fields-metafields) in a single request. If you omit the namespace, then the [app-reserved namespace](https://shopify.dev/docs/apps/build/metafields#app-owned-metafields) is used by default.\n"
interface HasMetafields {
  """
  A [custom field](https://shopify.dev/docs/apps/build/custom-data), including its `namespace` and `key`, that's associated with a Shopify resource for the purposes of adding and storing additional information.
  """
  metafield(
    """
    The container the metafield belongs to. If omitted, the app-reserved namespace will be used.
    """
    namespace: String

    """
    The identifier for the metafield.
    """
    key: String!
  ): Metafield

  """
  A list of [custom fields](/docs/apps/build/custom-data) that a merchant associates with a Shopify resource.
  """
  metafields(
    """
    The list of metafields to retrieve by namespace and key.

    The input must not contain more than `250` values.
    """
    identifiers: [HasMetafieldsIdentifier!]!
  ): [Metafield]!
}

"The input fields to identify a [`Metafield`](https://shopify.dev/docs/api/storefront/current/objects/Metafield) on an owner resource by namespace and key. Used as an argument to the [`metafields`](https://shopify.dev/docs/api/storefront/current/interfaces/HasMetafields#fields-metafields) field of the `HasMetafields` interface to retrieve multiple metafields in a single request.\n\nIf you omit the namespace, then the [app-reserved namespace](https://shopify.dev/docs/apps/build/metafields#app-owned-metafields) is used by default.\n"
input HasMetafieldsIdentifier {
  """
  The container the metafield belongs to. If omitted, the app-reserved namespace will be used.
  """
  namespace: String

  """
  The identifier for the metafield.
  """
  key: String!
}

