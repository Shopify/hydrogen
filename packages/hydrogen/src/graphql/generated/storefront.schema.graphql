  PAYMENT_REQUEST_INVALID_INPUT

  """
  Payment request not found.
  """
  PAYMENT_REQUEST_NOT_FOUND

  """
  Idempotency key has already been used.
  """
  IDEMPOTENCY_KEY_ALREADY_USED
}

"""
The input fields for a filter used to view a subset of products in a collection matching a specific variant option.
"""
input VariantOptionFilter {
  """
  The name of the variant option to filter on.
  """
  name: String!

  """
  The value of the variant option to filter on.
  """
  value: String!
}

"A video hosted on Shopify's servers. Implements the [`Media`](https://shopify.dev/docs/api/storefront/current/interfaces/Media) interface and provides multiple video sources through the [`sources`](https://shopify.dev/docs/api/storefront/current/objects/Video#field-Video.fields.sources) field, each with [format](https://shopify.dev/docs/api/storefront/current/objects/Video#field-Video.fields.sources.format), dimensions, and [URL information](https://shopify.dev/docs/api/storefront/current/objects/Video#field-Video.fields.sources.url) for adaptive playback.\n\nFor videos hosted on external platforms like YouTube or Vimeo, use [`ExternalVideo`](https://shopify.dev/docs/api/storefront/current/objects/ExternalVideo) instead.\n"
type Video implements Media & Node {
  """
  A word or phrase to share the nature or contents of a media.
  """
  alt: String

  """
  A globally-unique ID.
  """
  id: ID!

  """
  The media content type.
  """
  mediaContentType: MediaContentType!

  """
  The presentation for a media.
  """
  presentation: MediaPresentation

  """
  The preview image for the media.
  """
  previewImage: Image

  """
  The sources for a video.
  """
  sources: [VideoSource!]!
}

"""
Represents a source for a Shopify hosted video.
"""
type VideoSource {
  """
  The format of the video source.
  """
  format: String!

  """
  The height of the video.
  """
  height: Int!

  """
  The video MIME type.
  """
  mimeType: String!

  """
  The URL of the video.
  """
  url: String!

  """
  The width of the video.
  """
  width: Int!
}

"""
The visitor's consent to data processing purposes for the shop. true means accepting the purposes, false means declining them, and null means that the visitor didn't express a preference.
"""
input VisitorConsent {
  """
  The visitor accepts or rejects the preferences data processing purpose.
  """
  preferences: Boolean

  """
  The visitor accepts or rejects the analytics data processing purpose.
  """
  analytics: Boolean

  """
  The visitor accepts or rejects the first and third party marketing data processing purposes.
  """
  marketing: Boolean

  """
  The visitor accepts or rejects the sale or sharing of their data with third parties.
  """
  saleOfData: Boolean
}

"Units of measurement for weight, supporting both metric and imperial systems. Used by [`ProductVariant`](https://shopify.dev/docs/api/storefront/current/objects/ProductVariant) to specify the unit for the variant's weight value.\n"
enum WeightUnit {
  """
  1 kilogram equals 1000 grams.
  """
  KILOGRAMS

  """
  Metric system unit of mass.
  """
  GRAMS

  """
  1 pound equals 16 ounces.
