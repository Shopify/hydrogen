"A filter option available on collection and search results pages. Each filter includes a type, display label, and selectable values that customers can use to narrow down products.\n\nThe [`FilterValue`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue) objects contain an [`input`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue#field-FilterValue.fields.input) field that you can combine to [build dynamic filtering queries](https://shopify.dev/docs/storefronts/headless/building-with-the-storefront-api/products-collections/filter-products). Merchants [configure available filters](https://help.shopify.com/manual/online-store/search-and-discovery/filters) using the Shopify Search & Discovery app.\n"
type Filter {
  """
  A unique identifier.
  """
  id: String!

  """
  A human-friendly string for this filter.
  """
  label: String!

  "Describes how to present the filter values.\nReturns a value only for filters of type `LIST`. Returns null for other types.\n"
  presentation: FilterPresentation

  """
  An enumeration that denotes the type of data this filter represents.
  """
  type: FilterType!

  """
  The list of values for this filter.
  """
  values: [FilterValue!]!
}

"Defines how to present the filter values, specifies the presentation of the filter.\n"
enum FilterPresentation {
  """
  Image presentation, filter values display an image.
  """
  IMAGE

  """
  Swatch presentation, filter values display color or image patterns.
  """
  SWATCH

  """
  Text presentation, no additional visual display for filter values.
  """
  TEXT
}

"The type of data that the filter group represents.\n\nFor more information, refer to [Filter products in a collection with the Storefront API]\n(https://shopify.dev/custom-storefronts/products-collections/filter-products).\n"
enum FilterType {
  """
  A list of selectable values.
  """
  LIST

  """
  A range of prices.
  """
  PRICE_RANGE

  """
  A boolean value.
  """
  BOOLEAN
}

"A selectable option within a [`Filter`](https://shopify.dev/docs/api/storefront/current/objects/Filter), such as a specific color, size, or product type. Each value includes a count of matching results and a human-readable label for display.\n\nThe [`input`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue#field-FilterValue.fields.input) field provides ready-to-use JSON for building dynamic filtering interfaces. You can combine the `input` values from multiple selected [`FilterValue`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue) objects to construct filter queries. Visual representations are available through the [`image`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue#field-FilterValue.fields.image) or [`swatch`](https://shopify.dev/docs/api/storefront/current/objects/FilterValue#field-FilterValue.fields.swatch) fields when the parent filter's presentation type supports them.\n"
type FilterValue {
  """
  The number of results that match this filter value.
  """
  count: Int!

  """
  A unique identifier.
  """
  id: String!

  """
  The visual representation when the filter's presentation is `IMAGE`.
  """
  image: MediaImage

  "An input object that can be used to filter by this value on the parent field.\n\nThe value is provided as a helper for building dynamic filtering UI. For\nexample, if you have a list of selected `FilterValue` objects, you can combine\ntheir respective `input` values to use in a subsequent query.\n"
  input: JSON!

  """
  A human-friendly string for this filter value.
  """
  label: String!

  """
  The visual representation when the filter's presentation is `SWATCH`.
  """
  swatch: Swatch
}

"A shipment of one or more items in an order. Accessed through the [`Order`](https://shopify.dev/docs/api/storefront/current/objects/Order) object's [`successfulFulfillments`](https://shopify.dev/docs/api/storefront/current/objects/Order#field-Order.fields.successfulFulfillments) field.\n\nEach fulfillment includes the line items that shipped, the tracking company name, and tracking details like numbers and URLs. An order can have multiple fulfillments when items ship separately or from different locations.\n"
type Fulfillment {
  """
  List of the fulfillment's line items.
