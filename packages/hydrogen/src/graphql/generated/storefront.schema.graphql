    first: Int

    """
    Returns the elements that come after the specified cursor.
    """
    after: String

    """
    Returns up to the last `n` elements from the list.
    """
    last: Int

    """
    Returns the elements that come before the specified cursor.
    """
    before: String

    """
    Reverse the order of the underlying list.
    """
    reverse: Boolean = false
  ): FulfillmentLineItemConnection!

  """
  The name of the tracking company.
  """
  trackingCompany: String

  "Tracking information associated with the fulfillment,\nsuch as the tracking number and tracking URL.\n"
  trackingInfo(
    """
    Truncate the array result to this size.
    """
    first: Int
  ): [FulfillmentTrackingInfo!]!
}

"Records how many units of an [`OrderLineItem`](https://shopify.dev/docs/api/storefront/current/objects/OrderLineItem) were included in a [`Fulfillment`](https://shopify.dev/docs/api/storefront/current/objects/Fulfillment). Each order line item has at most one fulfillment line item per fulfillment.\n"
type FulfillmentLineItem {
